version: '3.8'

services:
  backend:
    build: .
    environment:
      - APP_TYPE=fastapi
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build: .
    environment:
      - APP_TYPE=streamlit
      - API_URL=http://backend:8000/extract-pdf
    ports:
      - "8501:8501"
    depends_on:
      - backend
